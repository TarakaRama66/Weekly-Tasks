<!DOCTYPE html>
<html>
<head>
    <title>Variables Demo</title>
</head>
<body>
    <h1>JavaScript Variables Example</h1>
    <script>
        // Student Information
        let studentName = "Gupta";
        let age = 22;
        let course = "JavaScript";
        console.log("Student Name: " + studentName);
        console.log("Age: " + age);
        console.log("Course: " + course);
        // Addition of Two Numbers
        let num1 = 10;
        let num2 = 20;
        let sum = num1 + num2;

        console.log("Sum = " + sum);

        // Employee Salary Calculation
        let basicSalary = 30000;
        let bonus = 5000;
        let totalSalary = basicSalary + bonus;

        console.log("Total Salary = " + totalSalary);

        // Rectangle Area Calculation
        let length = 15;
        let width = 10;
        let area = length * width;

        console.log("Area of Rectangle = " + area);

        // Student Marks Calculation
        let html = 85;
        let css = 90;
        let javascript = 95;

        let totalMarks = html + css + javascript;
        let percentage = totalMarks / 3;

        console.log("Total Marks = " + totalMarks);
        console.log("Percentage = " + percentage + "%");

        // Boolean Variable
        let isPlaced = true;

        console.log("Placement Status = " + isPlaced);

    </script>

</body>
</html>
