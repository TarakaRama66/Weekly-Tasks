<!DOCTYPE html>
<html>
<head>
    <title>Variable Declaration Methods</title>
</head>
<body>

    <h1>JavaScript Variables Demo</h1>

    <script>

        // var Declaration
        var studentName = "Tarak";
        var studentName = "Gupta"; // Redeclaration allowed

        console.log("Student Name: " + studentName);

        // let Declaration
        let age = 22;

        age = 23; // Updating allowed

        console.log("Age: " + age);

        // const Declaration
        const country = "India";

        console.log("Country: " + country);

        // Using Variables for Calculations
        let num1 = 50;
        let num2 = 25;

        let sum = num1 + num2;
        let difference = num1 - num2;
        let product = num1 * num2;
        let quotient = num1 / num2;

        console.log("Sum = " + sum);
        console.log("Difference = " + difference);
        console.log("Product = " + product);
        console.log("Quotient = " + quotient);

        // Student Marks Example
        let html = 85;
        let css = 90;
        let javascript = 95;

        let totalMarks = html + css + javascript;
        let percentage = totalMarks / 3;

        console.log("Total Marks = " + totalMarks);
        console.log("Percentage = " + percentage + "%");

        // Boolean Variable
        let isPlaced = true;

        console.log("Placement Status = " + isPlaced);

    </script>

</body>
</html>
