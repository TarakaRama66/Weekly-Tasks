<!DOCTYPE html>
<html>
<head>
    <title>Webpage Layout</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
    </header>

    <!-- Navigation Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>Sidebar</h3>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <h2>Main Content</h2>
            <p>Welcome to the main content section of the webpage.</p>

            <!-- Cards -->
            <div class="card-container">
                <div class="card">
                    <h3>Card 1</h3>
                    <p>This is the first card.</p>
                </div>

                <div class="card">
                    <h3>Card 2</h3>
                    <p>This is the second card.</p>
                </div>

                <div class="card">
                    <h3>Card 3</h3>
                    <p>This is the third card.</p>
                </div>
            </div>
        </main>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; My Website</p>
    </footer>

</body>
</html>
