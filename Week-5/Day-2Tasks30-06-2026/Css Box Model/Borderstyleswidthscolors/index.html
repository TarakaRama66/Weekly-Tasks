<!DOCTYPE html>
<html>
<head>
<title>Border Styles</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

/* Solid Border */
.solid {
    border: 2px solid blue;
    padding: 15px;
    margin: 15px 0;
}

/* Dashed Border */
.dashed {
    border: 3px dashed green;
    padding: 15px;
    margin: 15px 0;
}

/* Dotted Border */
.dotted {
    border: 4px dotted red;
    padding: 15px;
    margin: 15px 0;
}

/* Double Border */
.double {
    border: 5px double purple;
    padding: 15px;
    margin: 15px 0;
}

/* Groove Border */
.groove {
    border: 6px groove orange;
    padding: 15px;
    margin: 15px 0;
}

/* Ridge Border */
.ridge {
    border: 6px ridge brown;
    padding: 15px;
    margin: 15px 0;
}
</style>

</head>
<body>

<h2>Border Styles, Widths, and Colors</h2>

<div class="solid">
    Solid Border (2px Blue)
</div>

<div class="dashed">
    Dashed Border (3px Green)
</div>

<div class="dotted">
    Dotted Border (4px Red)
</div>

<div class="double">
    Double Border (5px Purple)
</div>

<div class="groove">
    Groove Border (6px Orange)
</div>

<div class="ridge">
    Ridge Border (6px Brown)
</div>

</body>
</html>
