<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padding and Margin Practice</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

/* Box 1 - Same padding and margin on all sides */
.box1 {
    background-color: lightblue;
    padding: 20px;
    margin: 20px;
    border: 2px solid blue;
}

/* Box 2 - Different padding and margin for each side */
.box2 {
    background-color: lightgreen;
    padding: 10px 20px 30px 40px;   /* Top Right Bottom Left */
    margin: 15px 25px 35px 45px;    /* Top Right Bottom Left */
    border: 2px solid green;
}

/* Box 3 - Vertical and horizontal values */
.box3 {
    background-color: lightyellow;
    padding: 15px 30px;   /* Top & Bottom | Left & Right */
    margin: 25px 50px;    /* Top & Bottom | Left & Right */
    border: 2px solid orange;
}

/* Box 4 - Individual properties */
.box4 {
    background-color: lightcoral;
    padding-top: 20px;
    padding-right: 30px;
    padding-bottom: 20px;
    padding-left: 30px;

    margin-top: 30px;
    margin-right: 40px;
    margin-bottom: 30px;
    margin-left: 40px;

    border: 2px solid red;
}
</style>

</head>
<body>

<h2>Padding and Margin Practice</h2>

<div class="box1">
    Box 1: Equal padding (20px) and margin (20px)
</div>

<div class="box2">
    Box 2: Different padding and margin values for each side
</div>

<div class="box3">
    Box 3: Vertical and horizontal padding/margin
</div>

<div class="box4">
    Box 4: Individual padding and margin properties
</div>

</body>
</html>
