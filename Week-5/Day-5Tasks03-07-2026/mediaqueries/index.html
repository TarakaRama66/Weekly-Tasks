<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Queries Example</title>
<style>
/*Default Styles*/
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}
header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    display:flex;
    justify-content:space-between;
    gap:20px;
    padding:20px;
}
.box{
    flex:1;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    text-align:center;
}
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}
/*Tablet*/
@media screen and (max-width:768px){
.container{
    flex-direction:column;
}
body{
    background:#e8f5ff;
}
header{
    font-size:20px;
}
}
/* Mobile */
@media screen and (max-width:480px){
header{
    padding:15px;
    font-size:18px;
}
.box{
    padding:15px;
    font-size:14px;
}
footer{
    font-size:14px;
}
}
</style>
</head>
<body>
<header>
<h1>Responsive Web Page</h1>
</header>
<div class="container">
<div class="box">
<h2>HTML</h2>
<p>Learn the structure of web pages.</p>
</div>
<div class="box">
<h2>CSS</h2>
<p>Style and design responsive websites.</p>
</div>
<div class="box">
<h2>JavaScript</h2>
<p>Add interactivity to your web applications.</p>
</div>
</div>
<footer>
<p>© 2026 Responsive Design Example</p>
</footer>
</body>
</html>
