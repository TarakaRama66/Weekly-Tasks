<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox and Grid Alignment</title>
<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
h2{
    margin:20px 0;
}
/* Common Box Style */
.item{
    background:#3498db;
    color:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
    font-weight:bold;
}
/* Flexbox */
.flex-container{
    display:flex;
    height:220px;
    background:white;
    border:2px solid #ccc;
    justify-content:space-evenly;
    align-items:center;
    margin-bottom:40px;
}
.flex-item{
    width:100px;
}
/* align-self */
.special{
    align-self:flex-start;
    background:#e74c3c;
}
/* Grid */
.grid-container{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(2,100px);
    justify-content:center;
    align-content:center;
    place-items:center;
    gap:20px;
    height:320px;
    background:white;
    border:2px solid #ccc;
}
/* justify-self & align-self */
.grid-item2{
    justify-self:end;
    align-self:start;
    background:#27ae60;
}
</style>
</head>
<body>
<h1>Flexbox & Grid Alignment Practice</h1>
<h2>Flexbox Alignment</h2>
<div class="flex-container">
<div class="item flex-item">1</div>
<div class="item flex-item special">2</div>
<div class="item flex-item">3</div>
</div>
<h2>Grid Alignment</h2>
<div class="grid-container">
<div class="item">1</div>
<div class="item grid-item2">2</div>
<div class="item">3</div>
<div class="item">4</div>
<div class="item">5</div>
<div class="item">6</div>
</div>
</body>
</html>
